name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.2.0)"
        required: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust-targets: x86_64-pc-windows-msvc
            tauri-args: ""
            artifact-name: game-library-windows
            artifact-path: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/msi/*.msi

          - platform: ubuntu-latest
            rust-targets: x86_64-unknown-linux-gnu
            tauri-args: ""
            artifact-name: game-library-linux
            artifact-path: |
              src-tauri/target/release/bundle/appimage/*.AppImage

          - platform: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri-args: "--target universal-apple-darwin"
            artifact-name: game-library-mac
            artifact-path: |
              src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            patchelf pkg-config build-essential

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump versions
        run: |
          node -e "
            const fs = require('fs');
            const version = '${{ inputs.version }}';

            const confPath = 'src-tauri/tauri.conf.json';
            const conf = JSON.parse(fs.readFileSync(confPath, 'utf8'));
            conf.version = version;
            fs.writeFileSync(confPath, JSON.stringify(conf, null, 2) + '\n');

            const cargoPath = 'src-tauri/Cargo.toml';
            const cargo = fs.readFileSync(cargoPath, 'utf8');
            fs.writeFileSync(cargoPath, cargo.replace(/^version = \"[^\"]+\"/m, \`version = \"\${version}\"\`));

            console.log('Bumped to', version);
          "

      - run: corepack enable && yarn --version
      - run: yarn install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri app
        run: yarn tauri build ${{ matrix.tauri-args }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ inputs.version }}"
          files: artifacts/*
          generate_release_notes: true
